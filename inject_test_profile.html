<!DOCTYPE html>
<html>
<head>
    <title>Inject Test Profile</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 10px 0; }
        button:hover { background: #2563eb; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>GenFin.ai - Test Profile Injector</h1>
    <p>This will inject test financial data into localStorage for testing.</p>
    
    <button onclick="injectProfile()">Inject Test Profile Data</button>
    <button onclick="clearProfile()">Clear Profile Data</button>
    <button onclick="checkProfile()">Check Current Profile</button>
    
    <div id="status"></div>
    
    <script>
        function showStatus(message, type = 'success') {
            const status = document.getElementById('status');
            status.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
        
        function injectProfile() {
            const testProfile = {
                income: 1200000,
                expenses: 800000,
                savings: 400000,
                debt: 200000,
                emergencyFundMonths: 6,
                age: 35,
                investmentMindset: "moderate",
                financialStatus: "healthy",
                fullName: "Test User",
                email: "test@example.com",
                phone: "1234567890"
            };
            
            localStorage.setItem('genfin_profile_for_slm', JSON.stringify(testProfile));
            showStatus('✅ Test profile injected successfully! Refresh GenFin AI tab to see dynamic data.', 'success');
        }
        
        function clearProfile() {
            localStorage.removeItem('genfin_profile_for_slm');
            showStatus('🗑️ Profile data cleared!', 'success');
        }
        
        function checkProfile() {
            const profile = localStorage.getItem('genfin_profile_for_slm');
            if (profile) {
                const data = JSON.parse(profile);
                showStatus(`📊 Current Profile:<br>
                    Income: ₹${data.income?.toLocaleString('en-IN')}<br>
                    Expenses: ₹${data.expenses?.toLocaleString('en-IN')}<br>
                    Savings: ₹${data.savings?.toLocaleString('en-IN')}<br>
                    Emergency Fund: ${data.emergencyFundMonths} months<br>
                    Debt: ₹${data.debt?.toLocaleString('en-IN')}`, 'success');
            } else {
                showStatus('❌ No profile found in localStorage', 'error');
            }
        }
        
        // Check profile on load
        checkProfile();
    </script>
</body>
</html>
